<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация — FitLog</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="header">
  <a href="/" class="header-logo">
    <div class="logo-icon">⚡</div>
    FitLog
  </a>
  <nav>
    <a href="/">Главная</a>
    <a href="/login">Войти</a>
  </nav>
</header>

<div class="auth-wrapper">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="logo-icon">⚡</div>
      FitLog
    </div>

    <h2>Создать аккаунт</h2>
    <p class="subtitle">Начни отслеживать прогресс уже сегодня</p>

    <div id="message"></div>

    <form id="registerForm" class="form">
      <div class="form-group">
        <label class="form-label" for="username">Имя пользователя</label>
        <input type="text" id="username" name="username" placeholder="your_username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-full" style="margin-top: 6px;">Зарегистрироваться</button>
    </form>

    <p class="auth-footer">
      Уже есть аккаунт? <a href="/login">Войти</a>
    </p>

  </div>
</div>

<script src="/static/js/auth.js"></script>
</body>
</html>
