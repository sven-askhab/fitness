<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — FitLog</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="header">
  <a href="/" class="header-logo">
    <div class="logo-icon">⚡</div>
    FitLog
  </a>
  <nav>
    <a href="/">Главная</a>
    <a href="/register" class="btn-nav">Регистрация</a>
  </nav>
</header>

<div class="auth-wrapper">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="logo-icon">⚡</div>
      FitLog
    </div>

    <h2>С возвращением</h2>
    <p class="subtitle">Войди, чтобы продолжить тренировки</p>

    <div id="message"></div>

    <form id="loginForm" class="form">
      <div class="form-group">
        <label class="form-label" for="username">Имя пользователя</label>
        <input type="text" id="username" name="username" placeholder="your_username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-full" style="margin-top: 6px;">Войти</button>
    </form>

    <p class="auth-footer">
      Нет аккаунта? <a href="/register">Зарегистрироваться</a>
    </p>

  </div>
</div>

<script src="/static/js/auth.js"></script>
</body>
</html>
